<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Metaball Type — Letters &amp; Numbers from 2D Blobs</title>
<style>
  :root {
    --bg: #0e0f14;
    --panel: #171922;
    --panel-2: #1f2230;
    --line: #2c3040;
    --text: #e7e9f0;
    --muted: #9aa0b4;
    --accent: #5ce1e6;
    --accent-2: #b388ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 80% -10%, #1a2030 0%, var(--bg) 60%);
    color: var(--text);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }
  header h1 { font-size: 16px; margin: 0 0 2px; letter-spacing: .3px; }
  header p { margin: 0; color: var(--muted); font-size: 12px; }

  /* ---- Control panel ---- */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 18px 16px 28px;
    overflow-y: auto;
    max-height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .brand .dot {
    width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-2));
    box-shadow: 0 0 18px rgba(124,225,230,.5);
    flex: none;
  }
  .group { margin-bottom: 20px; }
  .group > h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--muted); margin: 0 0 10px; font-weight: 600;
  }
  label.field { display: block; margin-bottom: 12px; }
  label.field > span.lbl {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; color: var(--muted); margin-bottom: 5px;
  }
  label.field > span.lbl b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  input[type="text"], textarea, select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px;
    font: inherit; outline: none;
  }
  input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 54px; }
  input[type="range"] {
    width: 100%; -webkit-appearance: none; appearance: none; height: 4px;
    border-radius: 4px; background: var(--line); outline: none; margin: 6px 0 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid #0c0d12; box-shadow: 0 0 8px rgba(124,225,230,.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
    cursor: pointer; border: 2px solid #0c0d12;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .swatch { display: flex; align-items: center; gap: 8px; }
  input[type="color"] {
    width: 38px; height: 30px; padding: 0; border: 1px solid var(--line);
    border-radius: 6px; background: var(--panel-2); cursor: pointer;
  }
  .toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .toggle span { font-size: 12.5px; }
  .switch { position: relative; width: 40px; height: 22px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: var(--line); border-radius: 22px;
    transition: .15s; cursor: pointer;
  }
  .slider::before {
    content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px;
    background: #cfd3e0; border-radius: 50%; transition: .15s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); background: #06262a; }
  .btns { display: flex; gap: 8px; margin-top: 6px; }
  button {
    flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 10px; font: inherit; cursor: pointer; transition: .12s;
  }
  button:hover { border-color: var(--accent); color: #fff; }
  button.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #06121a; border: none; font-weight: 600; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ---- Stage ---- */
  main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { padding: 16px 22px; border-bottom: 1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 28px; overflow: auto;
  }
  .canvas-wrap {
    border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.45);
    max-width: 100%;
    background-image:
      linear-gradient(45deg, #15171f 25%, transparent 25%),
      linear-gradient(-45deg, #15171f 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #15171f 75%),
      linear-gradient(-45deg, transparent 75%, #15171f 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
  }
  canvas { display: block; max-width: 100%; height: auto; border-radius: 14px; }
  .stat { font-size: 12px; color: var(--muted); }
  a.link { color: var(--accent); text-decoration: none; }
  a.link:hover { text-decoration: underline; }

  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; }
    aside { max-height: none; }
  }
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="dot"></div>
      <header>
        <h1>Metaball Type</h1>
        <p>Letters &amp; numbers grown from 2D blobs</p>
      </header>
    </div>

    <div class="group">
      <h2>Text</h2>
      <label class="field">
        <span class="lbl">Your text</span>
        <textarea id="text" maxlength="60" spellcheck="false">GOO 123</textarea>
      </label>
      <label class="field">
        <span class="lbl">Font</span>
        <select id="fontFamily">
          <option value="900 {s}px 'Arial Black', Arial, sans-serif">Arial Black (heavy)</option>
          <option value="bold {s}px Impact, Haettenschweiler, sans-serif">Impact</option>
          <option value="bold {s}px Georgia, 'Times New Roman', serif">Georgia (serif)</option>
          <option value="bold {s}px 'Courier New', monospace">Courier (mono)</option>
          <option value="700 {s}px Verdana, Geneva, sans-serif">Verdana</option>
        </select>
        <div class="hint">Heavier fonts merge into cleaner blobs.</div>
      </label>
      <label class="field">
        <span class="lbl">Font size <b id="fontSizeV"></b></span>
        <input type="range" id="fontSize" min="40" max="220" value="130" />
      </label>
    </div>

    <div class="group">
      <h2>Metaball / Blob</h2>
      <label class="field">
        <span class="lbl">Blob spacing <b id="spacingV"></b></span>
        <input type="range" id="spacing" min="4" max="26" value="9" />
        <div class="hint">Distance between blob centers along each glyph.</div>
      </label>
      <label class="field">
        <span class="lbl">Blob radius <b id="radiusV"></b></span>
        <input type="range" id="radius" min="6" max="80" value="26" />
      </label>
      <label class="field">
        <span class="lbl">Field strength <b id="strengthV"></b></span>
        <input type="range" id="strength" min="10" max="100" value="62" />
      </label>
      <label class="field">
        <span class="lbl">Threshold (iso-level) <b id="thresholdV"></b></span>
        <input type="range" id="threshold" min="5" max="95" value="38" />
        <div class="hint">Lower = fatter, more merged. Higher = thin &amp; separated.</div>
      </label>
      <label class="field">
        <span class="lbl">Edge smoothing <b id="smoothV"></b></span>
        <input type="range" id="smooth" min="0" max="40" value="10" />
      </label>
    </div>

    <div class="group">
      <h2>Motion</h2>
      <div class="toggle">
        <span>Animate (living goo)</span>
        <label class="switch"><input type="checkbox" id="animate" /><span class="slider"></span></label>
      </div>
      <label class="field">
        <span class="lbl">Wobble amount <b id="wobbleV"></b></span>
        <input type="range" id="wobble" min="0" max="30" value="8" />
      </label>
      <label class="field">
        <span class="lbl">Speed <b id="speedV"></b></span>
        <input type="range" id="speed" min="1" max="40" value="14" />
      </label>
    </div>

    <div class="group">
      <h2>Color</h2>
      <div class="toggle">
        <span>Gradient fill</span>
        <label class="switch"><input type="checkbox" id="useGradient" checked /><span class="slider"></span></label>
      </div>
      <div class="row">
        <label class="field">
          <span class="lbl">Blob A</span>
          <div class="swatch"><input type="color" id="colorA" value="#5ce1e6" /></div>
        </label>
        <label class="field">
          <span class="lbl">Blob B</span>
          <div class="swatch"><input type="color" id="colorB" value="#b388ff" /></div>
        </label>
      </div>
      <div class="toggle">
        <span>Transparent background</span>
        <label class="switch"><input type="checkbox" id="transparentBg" /><span class="slider"></span></label>
      </div>
      <label class="field">
        <span class="lbl">Background</span>
        <div class="swatch"><input type="color" id="bgColor" value="#0e0f14" /></div>
      </label>
      <div class="toggle">
        <span>Outline</span>
        <label class="switch"><input type="checkbox" id="useOutline" /><span class="slider"></span></label>
      </div>
      <div class="row">
        <label class="field">
          <span class="lbl">Outline color</span>
          <div class="swatch"><input type="color" id="outlineColor" value="#06121a" /></div>
        </label>
        <label class="field">
          <span class="lbl">Outline width <b id="outlineWV"></b></span>
          <input type="range" id="outlineW" min="1" max="20" value="6" />
        </label>
      </div>
    </div>

    <div class="btns">
      <button id="randomize">🎲 Randomize</button>
      <button id="download" class="primary">⬇ PNG</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="stat" id="stat">—</div>
      <div class="stat">2D metaballs · <a class="link" id="repoLink" href="#" target="_blank" rel="noopener">source</a></div>
    </div>
    <div class="stage">
      <div class="canvas-wrap">
        <canvas id="view"></canvas>
      </div>
    </div>
  </main>

<script>
(() => {
  "use strict";

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const view = $("view");
  const ctx = view.getContext("2d");

  // Offscreen canvas that renders the text (to sample blob centers from)
  const glyph = document.createElement("canvas");
  const gctx = glyph.getContext("2d", { willReadFrequently: true });
  // Unclamped floating-point scalar field — the heart of real metaballs.
  let fieldBuf = null;

  const controls = {
    text: $("text"), fontFamily: $("fontFamily"), fontSize: $("fontSize"),
    spacing: $("spacing"), radius: $("radius"), strength: $("strength"),
    threshold: $("threshold"), smooth: $("smooth"),
    animate: $("animate"), wobble: $("wobble"), speed: $("speed"),
    useGradient: $("useGradient"), colorA: $("colorA"), colorB: $("colorB"),
    transparentBg: $("transparentBg"), bgColor: $("bgColor"),
    useOutline: $("useOutline"), outlineColor: $("outlineColor"), outlineW: $("outlineW"),
  };

  // Live value labels
  const labels = {
    fontSize: "fontSizeV", spacing: "spacingV", radius: "radiusV",
    strength: "strengthV", threshold: "thresholdV", smooth: "smoothV",
    wobble: "wobbleV", speed: "speedV", outlineW: "outlineWV",
  };
  function syncLabels() {
    for (const k in labels) $(labels[k]).textContent = controls[k].value;
  }

  // ---------- Helpers ----------
  const PAD = 60; // px padding around the text on the canvas
  function hexToRgb(h) {
    const n = parseInt(h.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  // Build the list of blob centers by sampling filled glyph pixels.
  let blobs = [];
  let baseW = 800, baseH = 300;

  function buildBlobs() {
    const text = controls.text.value || " ";
    const fs = +controls.fontSize.value;
    const fontSpec = controls.fontFamily.value.replace("{s}", fs);
    const spacing = +controls.spacing.value;

    // Support multiple lines split on newline
    const lines = text.split("\n");
    gctx.font = fontSpec;
    gctx.textBaseline = "alphabetic";
    let maxW = 1;
    for (const ln of lines) maxW = Math.max(maxW, gctx.measureText(ln).width);
    const lineH = fs * 1.18;
    const textH = lineH * lines.length;

    baseW = Math.ceil(maxW) + PAD * 2;
    baseH = Math.ceil(textH) + PAD * 2;

    glyph.width = baseW; glyph.height = baseH;
    gctx.clearRect(0, 0, baseW, baseH);
    gctx.font = fontSpec;
    gctx.fillStyle = "#fff";
    gctx.textBaseline = "alphabetic";
    gctx.textAlign = "center";
    for (let i = 0; i < lines.length; i++) {
      const y = PAD + (i + 1) * lineH - fs * 0.24;
      gctx.fillText(lines[i], baseW / 2, y);
    }

    const data = gctx.getImageData(0, 0, baseW, baseH).data;
    blobs = [];
    for (let y = 0; y < baseH; y += spacing) {
      for (let x = 0; x < baseW; x += spacing) {
        if (data[(y * baseW + x) * 4 + 3] > 100) {
          // phases for the wobble animation
          blobs.push({ x, y, px: Math.random() * 6.283, py: Math.random() * 6.283 });
        }
      }
    }

    // Size the visible canvas and (re)allocate the float field buffer
    view.width = baseW; view.height = baseH;
    fieldBuf = new Float32Array(baseW * baseH);

    $("stat").textContent =
      `${blobs.length} metaballs · ${baseW}×${baseH}px · "${text.replace(/\n/g, " ")}"`;
  }

  // ---------- Rendering ----------
  // Real 2D metaballs: every blob adds a smooth falloff to a shared scalar
  // field, accumulated WITHOUT clamping (Float32). Because the field from two
  // nearby blobs sums in the gap between them, the region between them crosses
  // the iso-threshold and a smooth connecting "neck" forms — that's what makes
  // them merge instead of just overlapping as hard circles.
  function render(t) {
    const radius = +controls.radius.value;
    const peak = +controls.strength.value / 100;          // per-blob peak contribution
    const T = (+controls.threshold.value / 100) * 1.2;    // iso-level in field units
    const smoothUI = +controls.smooth.value;
    const band = Math.max(0.006, smoothUI / 200);         // smoothstep half-width
    const wobble = controls.animate.checked ? +controls.wobble.value : 0;
    const speed = +controls.speed.value / 1000;

    const W = baseW, H = baseH;
    const F = fieldBuf;
    F.fill(0);
    const R2 = radius * radius;
    const invR2 = 1 / R2;

    // 1) Splat each blob's Wyvill falloff (1 - d²/R²)² into the float field.
    for (let i = 0; i < blobs.length; i++) {
      const b = blobs[i];
      let bx = b.x, by = b.y;
      if (wobble) {
        bx += Math.cos(t * speed + b.px) * wobble;
        by += Math.sin(t * speed + b.py) * wobble;
      }
      let x0 = (bx - radius) | 0, x1 = Math.ceil(bx + radius);
      let y0 = (by - radius) | 0, y1 = Math.ceil(by + radius);
      if (x0 < 0) x0 = 0; if (y0 < 0) y0 = 0;
      if (x1 > W) x1 = W; if (y1 > H) y1 = H;
      for (let y = y0; y < y1; y++) {
        const dy = y - by, dy2 = dy * dy, row = y * W;
        for (let x = x0; x < x1; x++) {
          const dx = x - bx;
          const d2 = dx * dx + dy2;
          if (d2 < R2) {
            const q = 1 - d2 * invR2;   // 1 at center -> 0 at radius
            F[row + x] += peak * q * q;
          }
        }
      }
    }

    // 2) Threshold the field into the visible image.
    const out = ctx.createImageData(W, H);
    const o = out.data;

    const [ar, ag, ab] = hexToRgb(controls.colorA.value);
    const [br, bg, bb] = hexToRgb(controls.colorB.value);
    const useGrad = controls.useGradient.checked;
    const [bgr, bgg, bgb] = hexToRgb(controls.bgColor.value);
    const transparent = controls.transparentBg.checked;
    const useOutline = controls.useOutline.checked;
    const [or_, og, ob] = hexToRgb(controls.outlineColor.value);
    const outlineField = (+controls.outlineW.value) / 100; // outline depth in field units
    const lo = T - band, span = 2 * band;

    for (let y = 0; y < H; y++) {
      const yo = y * W;
      for (let x = 0; x < W; x++) {
        const idx = yo + x;
        const v = F[idx];
        const i4 = idx * 4;

        // Fill color (horizontal gradient across the canvas)
        let r, g, bl;
        if (useGrad) {
          const tt = x / W;
          r = ar + (br - ar) * tt;
          g = ag + (bg - ag) * tt;
          bl = ab + (bb - ab) * tt;
        } else { r = ar; g = ag; bl = ab; }

        // smoothstep alpha around the iso-threshold
        let alpha = (v - lo) / span;
        alpha = alpha < 0 ? 0 : alpha > 1 ? 1 : alpha;

        // Outline: a band of field values just above the surface
        if (useOutline && alpha > 0) {
          const inner = T + outlineField;
          let outFrac = (inner - v) / Math.max(band, 1e-4);
          outFrac = outFrac < 0 ? 0 : outFrac > 1 ? 1 : outFrac;
          outFrac *= alpha;
          r = r + (or_ - r) * outFrac;
          g = g + (og - g) * outFrac;
          bl = bl + (ob - bl) * outFrac;
        }

        if (transparent) {
          o[i4] = r; o[i4 + 1] = g; o[i4 + 2] = bl; o[i4 + 3] = (alpha * 255) | 0;
        } else {
          o[i4]     = (r * alpha + bgr * (1 - alpha)) | 0;
          o[i4 + 1] = (g * alpha + bgg * (1 - alpha)) | 0;
          o[i4 + 2] = (bl * alpha + bgb * (1 - alpha)) | 0;
          o[i4 + 3] = 255;
        }
      }
    }
    ctx.putImageData(out, 0, 0);
  }

  // ---------- Loop ----------
  let raf = null, start = performance.now();
  function frame(now) {
    render(now - start);
    if (controls.animate.checked) raf = requestAnimationFrame(frame);
    else raf = null;
  }
  function kick() {
    if (controls.animate.checked) {
      if (!raf) { start = performance.now(); raf = requestAnimationFrame(frame); }
    } else {
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      render(performance.now() - start);
    }
  }
  function rebuild() { buildBlobs(); kick(); }

  // ---------- Wiring ----------
  // Controls that change geometry -> rebuild blob set
  ["text", "fontFamily", "fontSize", "spacing"].forEach((id) =>
    controls[id].addEventListener("input", () => { syncLabels(); rebuild(); }));
  // Controls that only change appearance -> just re-render
  ["radius", "strength", "threshold", "smooth", "wobble", "speed",
   "useGradient", "colorA", "colorB", "transparentBg", "bgColor",
   "useOutline", "outlineColor", "outlineW"].forEach((id) =>
    controls[id].addEventListener("input", () => { syncLabels(); kick(); }));
  controls.animate.addEventListener("change", kick);

  // Randomize
  $("randomize").addEventListener("click", () => {
    const rnd = (a, b) => Math.round(a + Math.random() * (b - a));
    controls.spacing.value = rnd(6, 14);
    controls.radius.value = rnd(14, 40);
    controls.strength.value = rnd(35, 80);
    controls.threshold.value = rnd(28, 60);
    controls.smooth.value = rnd(4, 22);
    const h = () => "#" + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
    controls.colorA.value = h();
    controls.colorB.value = h();
    controls.useGradient.checked = Math.random() > 0.3;
    syncLabels(); rebuild();
  });

  // Download PNG (re-render current frame first to be safe)
  $("download").addEventListener("click", () => {
    render(performance.now() - start);
    const a = document.createElement("a");
    a.download = "metaball-type.png";
    a.href = view.toDataURL("image/png");
    a.click();
  });

  // Source link points at the hosting repo when on GitHub Pages
  (() => {
    const m = location.hostname.match(/^([^.]+)\.github\.io$/);
    if (m) {
      const repo = location.pathname.split("/").filter(Boolean)[0] || "";
      $("repoLink").href = `https://github.com/${m[1]}/${repo}`;
    } else {
      $("repoLink").href = "https://github.com/";
    }
  })();

  // ---------- Init ----------
  syncLabels();
  rebuild();
})();
</script>
</body>
</html>
